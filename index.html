      function useSingleVideoPlayback() {
        useEffect(() => {
          const stopOtherVideos = (event) => {
            const currentVideo = event.target;
            if (!currentVideo || currentVideo.tagName !== "VIDEO" || !currentVideo.controls) {
              return;
            }

            document.querySelectorAll("video[controls]").forEach((video) => {
              if (video !== currentVideo && !video.paused) {
                video.pause();
              }
            });
          };

          document.addEventListener("play", stopOtherVideos, true);
          return () => document.removeEventListener("play", stopOtherVideos, true);
        }, []);
      }

      function BottomContactDock() {
        const [visible, setVisible] = useState(false);

        useEffect(() => {
          const update = () => {
            const selected = document.getElementById("selected-works");
            const closing = document.getElementById("closing");
            if (!selected || !closing) {
              setVisible(false);
              return;
            }

            const scrollY = window.scrollY || window.pageYOffset || 0;
            const selectedTop = selected.getBoundingClientRect().top + scrollY;
            const closingTop = closing.getBoundingClientRect().top + scrollY;
            const reachedContents = scrollY + 120 >= selectedTop;
            const beforeClosing = scrollY + window.innerHeight - 90 < closingTop;
            setVisible(reachedContents && beforeClosing);
          };

          update();
          window.addEventListener("scroll", update, { passive: true });
          window.addEventListener("resize", update);
          return () => {
            window.removeEventListener("scroll", update);
            window.removeEventListener("resize", update);
          };
        }, []);

        if (!visible) return null;

        return h(
          "aside",
          {
            className:
              "fixed bottom-4 left-1/2 z-40 flex w-[min(760px,calc(100%-1.5rem))] -translate-x-1/2 items-center justify-between gap-4 border border-white/10 bg-black/[0.82] px-4 py-3 shadow-[0_18px_55px_rgba(0,0,0,0.42)] backdrop-blur-md",
